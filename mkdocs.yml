site_name: PyQtGraph-GIS Documentation
site_url: https://olemeif.github.io/pyqtgraph-gis/
repo_url: https://github.com/olemeif/pyqtgraph-gis
repo_name: olemeif/pyqtgraph-gis
edit_uri: edit/main/docs/
site_description: >-
  Documentation for the PyQtGraph-GIS library.
  Setup Guide and Tutorials on how to create Map-Apps with Python and PyQtGraph-GIS.
theme:
  palette:

    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: light
      accent: light
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: dark
      accent: dark
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

  icon:
    logo: lucide/map
    repo: fontawesome/brands/github
  favicon: assets/logos/favicon.svg
  font: false

  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.path
    - navigation.footer
    - navigation.expand
    - search.suggest
    - search.highlight
    - search.share
    - content.action.edit
    - content.action.view
    - content.code.copy
    - content.code.select
    - content.code.annotate
    - toc.integrate
extra_css:
  - stylesheets/extra.css
extra:
  consent:
    title: Cookie consent
    description: >-
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.
    actions:
      - accept
      - manage
      - reject
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/olemeif/pyqtgraph-gis
      name: PyQtGraph-GIS on GitHub
  analytics:
    provider: google
    property: !ENV GOOGLE_ANALYTICS_KEY
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/emoticon-happy-outline
          name: This page was helpful
          data: 1
          note: >-
            Thanks for your feedback!
        - icon: material/emoticon-sad-outline
          name: This page could be improved
          data: 0
          note: >-
            Thanks for your feedback!

copyright: >
  Copyright &copy; 2026 Ole Meiforth –
  <a href="#__consent">Change cookie settings</a>
plugins:
  - privacy
  - search
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details